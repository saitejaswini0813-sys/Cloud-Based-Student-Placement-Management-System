<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        Admin Dashboard
    </h2>

    <!-- Statistics Cards -->

    <div class="row">

        <div class="col-md-3">
            <div class="card bg-primary text-white text-center shadow">
                <div class="card-body">
                    <h1>{{ students }}</h1>
                    <h5>Total Students</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white text-center shadow">
                <div class="card-body">
                    <h1>{{ companies }}</h1>
                    <h5>Total Companies</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark text-center shadow">
                <div class="card-body">
                    <h1>{{ jobs }}</h1>
                    <h5>Total Jobs</h5>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white text-center shadow">
                <div class="card-body">
                    <h1>{{ applications }}</h1>
                    <h5>Total Applications</h5>
                </div>
            </div>
        </div>

    </div>

    <hr class="my-5">

    <!-- Chart -->

    <h3 class="text-center mb-4">
        Placement Statistics
    </h3>

    <canvas id="placementChart" height="100"></canvas>

    <hr class="my-5">

    <!-- Navigation Buttons -->

    <div class="row g-3">

        <div class="col-md-3">
            <a href="/admin_students" class="btn btn-primary w-100">
                👨‍🎓 Students
            </a>
        </div>

        <div class="col-md-3">
            <a href="/admin_companies" class="btn btn-success w-100">
                🏢 Companies
            </a>
        </div>

        <div class="col-md-3">
            <a href="/admin_jobs" class="btn btn-warning w-100">
                💼 Jobs
            </a>
        </div>

        <div class="col-md-3">
            <a href="/admin_applications" class="btn btn-danger w-100">
                📄 Applications
            </a>
        </div>

    </div>

    <div class="text-center mt-4">

        <a href="/admin_logout" class="btn btn-dark">
            Logout
        </a>

    </div>

</div>

<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById('placementChart');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: [
            'Students',
            'Companies',
            'Jobs',
            'Applications'
        ],

        datasets: [{

            label: 'Total Count',

            data: [
                {{ students }},
                {{ companies }},
                {{ jobs }},
                {{ applications }}
            ],

            backgroundColor: [
                '#0d6efd',
                '#198754',
                '#ffc107',
                '#dc3545'
            ],

            borderWidth: 1

        }]

    },

    options: {

        responsive: true,

        plugins: {

            legend: {
                display: false
            }

        },

        scales: {

            y: {

                beginAtZero: true

            }

        }

    }

});

</script>

</body>
</html>
