<!DOCTYPE html>
<html>
<head>

<title>Company Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">

Placement Management System

</a>

<a href="/" class="btn btn-light">

Logout

</a>

</div>

</nav>

<div class="container mt-5">

<h2>Welcome {{ company }}</h2>

<hr>

<div class="row">

<div class="col-md-4">

<div class="card p-3">

<h4>💼 Post Job</h4>

<p>Create new job openings.</p>

<a href="/post_job" class="btn btn-success">

Post Job

</a>

</div>

</div>

<div class="col-md-4">

<div class="card p-3">

<h4>📋 View Jobs</h4>

<p>Manage posted jobs.</p>

</div>

</div>

<div class="col-md-4">

<div class="card p-3">

<h4>👨‍🎓 Applicants</h4>

<p>View students who applied.</p>

</div>

</div>

</div>

</div>

</body>

</html>
