<!DOCTYPE html>
<html>
<head>
    <title>Available Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Available Jobs</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
    <th>Company</th>
    <th>Job Title</th>
    <th>Role</th>
    <th>Salary</th>
    <th>Location</th>
    <th>Eligibility</th>
    <th>Last Date</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

{% for job in jobs %}

<tr>

<td>{{ job.company_name }}</td>

<td>{{ job.job_title }}</td>

<td>{{ job.job_role }}</td>

<td>{{ job.salary }}</td>

<td>{{ job.location }}</td>

<td>{{ job.eligibility }}</td>

<td>{{ job.last_date }}</td>

<td>

<a href="/apply_job/{{ job.id }}" class="btn btn-success">
Apply
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
